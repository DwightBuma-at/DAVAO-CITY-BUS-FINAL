<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Management - DC Bus Super Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: "Manrope", sans-serif;
    }

    .sidebar-item {
      transition: all 0.2s ease;
    }

    .sidebar-item:hover {
      background-color: rgba(6, 182, 212, 0.08);
      transform: translateX(4px);
    }

    .sidebar-item.active {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      color: white;
    }

    .sidebar-item.active:hover {
      background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
    }

    .logout-btn {
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background-color: rgba(239, 68, 68, 0.1);
      color: #dc2626;
    }

    .bus-card {
      transition: all 0.25s ease;
    }

    .bus-card:hover {
      box-shadow: 0 12px 40px rgba(6, 182, 212, 0.12);
      border-color: #06b6d4;
      transform: translateY(-2px);
    }

    .stops-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 4px 0;
    }

    .stop-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .stop-chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stop-arrow {
      color: #cbd5e1;
      flex-shrink: 0;
      margin: 0 2px;
    }

    .tab-btn {
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .expand-btn {
      transition: transform 0.3s ease;
    }

    .expand-btn.rotated {
      transform: rotate(180deg);
    }

    .route-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s ease;
    }

    .route-detail.open {
      max-height: 2000px;
    }

    .status-pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .modal-overlay {
      transition: opacity 0.2s ease;
    }

    .modal-panel {
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .edit-input {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .edit-input:focus {
      border-color: #06b6d4;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
    }
  </style>
</head>

<body class="bg-slate-50">
  <!-- Check Authentication -->
  <script>
    const session = sessionStorage.getItem('dc-bus-superadmin-session');
    if (!session) {
      window.location.href = '../login-superadmin.html';
    }
  </script>

  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
      <!-- Logo -->
      <div class="p-6 border-b border-slate-200">
        <img src="../assets/dcbuslogo.png" alt="DC Bus Logo" class="h-16 w-auto" />
      </div>

      <!-- Navigation -->
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="superadmin.html" id="nav-dashboard"
          class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </a>

        <a href="superadmin-bus.html" id="nav-bus-management"
          class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
          Bus Management
        </a>

        <a href="superadmin-audit_logs.html" id="nav-audit-logs"
          class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Audit Logs
        </a>

        <a href="superadmin-settings.html" id="nav-settings"
          class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Settings
        </a>
      </nav>

      <!-- Logout Button -->
      <div class="p-4 border-t border-slate-200">
        <button onclick="handleLogout()"
          class="logout-btn flex items-center gap-3 w-full px-4 py-3 rounded-xl font-semibold text-sm text-slate-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <!-- Header -->
      <header class="bg-white border-b border-slate-200 px-8 py-6">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">Bus Management</h1>
            <p class="text-sm text-slate-600 mt-1">Manage buses, routes, and operators</p>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-right">
              <p class="text-sm font-semibold text-slate-900" id="adminUsername">Super Admin</p>
              <p class="text-xs text-slate-500">Administrator</p>
            </div>
            <div
              class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-cyan-600 flex items-center justify-center text-white font-bold">
              SA
            </div>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <div class="p-8">
        <!-- Summary Cards -->
        <div class="grid gap-5 md:grid-cols-3 mb-8" id="summary-cards">
          <!-- Injected by JS -->
        </div>

        <!-- Search & Filter Bar -->
        <div class="flex flex-wrap items-center gap-3 mb-6">
          <div class="relative flex-1 min-w-[240px] max-w-md">
            <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="searchInput" placeholder="Search by route code, stop name..."
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent" />
          </div>
          <select id="filterStatus"
            class="px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
            <option value="all">All Statuses</option>
            <option value="active">Active</option>
            <option value="maintenance">Maintenance</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <!-- Bus Route Cards -->
        <div class="space-y-4" id="bus-list">
          <!-- Injected by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Bus Modal -->
  <div id="editBusModal"
    class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 backdrop-blur-sm p-4">
    <div class="modal-panel w-full max-w-lg rounded-2xl border border-slate-200 bg-white shadow-2xl">
      <div class="flex items-start justify-between gap-4 border-b border-slate-200 p-6 pb-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.25em] text-slate-500">Edit Bus</p>
          <h2 id="editModalTitle" class="mt-2 text-xl font-extrabold text-slate-900"></h2>
        </div>
        <button onclick="closeEditModal()" type="button"
          class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 text-slate-600 transition hover:bg-slate-100">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <form id="editBusForm" class="p-6 space-y-4">
        <input type="hidden" id="editBusIndex" />
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-500">Bus Login ID</label>
            <input id="editBusLoginId" type="text"
              class="edit-input w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-900 outline-none"
              placeholder="e.g. R102-BUS1" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-500">Bus Login Code</label>
            <input id="editBusLoginCode" type="text"
              class="edit-input w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-900 outline-none"
              placeholder="e.g. dc2024" />
          </div>
        </div>
        <div>
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-500">Operator</label>
          <input id="editBusOperator" type="text"
            class="edit-input w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm text-slate-900 outline-none" />
        </div>
        <div>
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-500">Plate Number</label>
          <input id="editBusPlate" type="text"
            class="edit-input w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm text-slate-900 outline-none" />
        </div>
        <div class="flex items-center justify-end gap-3 pt-2">
          <button type="button" onclick="closeEditModal()"
            class="rounded-xl border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
            Cancel
          </button>
          <button type="submit"
            class="rounded-xl bg-gradient-to-r from-cyan-500 to-cyan-600 px-5 py-2.5 text-sm font-extrabold text-white transition hover:from-cyan-600 hover:to-cyan-700 shadow-lg shadow-cyan-500/25">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/route-map-data.js"></script>
  <script>
    // ─── Bus Fleet Data ───
    const FLEET_STORAGE_KEY = 'dc-bus-fleet-data-v1';

    const defaultBusFleet = [
      { id: 'BUS-001', plateNumber: 'LXY-1201', routeCode: 'R102', operator: 'Juan Dela Cruz', capacity: 90, status: 'active', year: 2024, busLoginId: 'R102-BUS1', busLoginCode: 'dc2024' },
      { id: 'BUS-002', plateNumber: 'LXY-1202', routeCode: 'R103', operator: 'Pedro Reyes', capacity: 90, status: 'active', year: 2024, busLoginId: 'R103-BUS2', busLoginCode: 'dc2024' },
      { id: 'BUS-003', plateNumber: 'LXY-1203', routeCode: 'R402', operator: 'Carlos Mendoza', capacity: 90, status: 'active', year: 2023, busLoginId: 'R402-BUS3', busLoginCode: 'dc2023' },
      { id: 'BUS-004', plateNumber: 'LXY-1204', routeCode: 'R403', operator: 'Miguel Torres', capacity: 90, status: 'maintenance', year: 2023, busLoginId: 'R403-BUS4', busLoginCode: 'dc2023' },
      { id: 'BUS-005', plateNumber: 'LXY-1205', routeCode: 'R503', operator: 'Roberto Aquino', capacity: 90, status: 'active', year: 2024, busLoginId: 'R503-BUS5', busLoginCode: 'dc2024' },
      { id: 'BUS-006', plateNumber: 'LXY-1206', routeCode: 'R603', operator: 'Antonio Ramos', capacity: 90, status: 'active', year: 2022, busLoginId: 'R603-BUS6', busLoginCode: 'dc2022' },
      { id: 'BUS-007', plateNumber: 'LXY-1207', routeCode: 'R763', operator: 'Francisco Bautista', capacity: 90, status: 'active', year: 2024, busLoginId: 'R763-BUS7', busLoginCode: 'dc2024' },
      { id: 'BUS-008', plateNumber: 'LXY-1208', routeCode: 'R783', operator: 'Ricardo Navarro', capacity: 90, status: 'inactive', year: 2021, busLoginId: 'R783-BUS8', busLoginCode: 'dc2021' },
      { id: 'BUS-009', plateNumber: 'LXY-1209', routeCode: 'R793', operator: 'Eduardo Santiago', capacity: 90, status: 'active', year: 2025, busLoginId: 'R793-BUS9', busLoginCode: 'dc2025' },
    ];

    // Load fleet from localStorage or use defaults
    function loadFleet() {
      try {
        const saved = localStorage.getItem(FLEET_STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) { }
      return JSON.parse(JSON.stringify(defaultBusFleet));
    }
    function saveFleet() {
      localStorage.setItem(FLEET_STORAGE_KEY, JSON.stringify(busFleet));
    }
    let busFleet = loadFleet();

    // ─── Route color palette ───
    const routeColors = {
      R102: { bg: 'bg-cyan-100', text: 'text-cyan-700', border: 'border-cyan-400', dot: '#06b6d4' },
      R103: { bg: 'bg-teal-100', text: 'text-teal-700', border: 'border-teal-400', dot: '#14b8a6' },
      R402: { bg: 'bg-violet-100', text: 'text-violet-700', border: 'border-violet-400', dot: '#8b5cf6' },
      R403: { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-indigo-400', dot: '#6366f1' },
      R503: { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-400', dot: '#f59e0b' },
      R603: { bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-rose-400', dot: '#f43f5e' },
      R763: { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-400', dot: '#10b981' },
      R783: { bg: 'bg-sky-100', text: 'text-sky-700', border: 'border-sky-400', dot: '#0ea5e9' },
      R793: { bg: 'bg-orange-100', text: 'text-orange-700', border: 'border-orange-400', dot: '#f97316' },
    };

    const statusConfig = {
      active: { label: 'Active', dotClass: 'bg-emerald-500', badgeBg: 'bg-emerald-100', badgeText: 'text-emerald-700' },
      maintenance: { label: 'Maintenance', dotClass: 'bg-amber-500', badgeBg: 'bg-amber-100', badgeText: 'text-amber-700' },
      inactive: { label: 'Inactive', dotClass: 'bg-slate-400', badgeBg: 'bg-slate-100', badgeText: 'text-slate-600' },
    };

    // ─── Get route data ───
    const routeMapData = window.dcBusRouteMapData || {};
    const detailedRoutes = routeMapData.detailedRoutes || {};
    const stopCoordinates = routeMapData.stopCoordinates || {};

    // ─── Render Summary Cards ───
    function renderSummary() {
      const totalBuses = busFleet.length;
      const onRoute = busFleet.filter(b => b.status === 'active').length;
      const offRoute = totalBuses - onRoute;

      document.getElementById('summary-cards').innerHTML = `
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-cyan-100 flex items-center justify-center">
                <svg class="w-5 h-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
              </div>
            </div>
            <p class="text-2xl font-bold text-slate-900">${totalBuses}</p>
            <p class="text-xs font-semibold text-slate-500 mt-0.5">Total Buses</p>
          </div>
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
            </div>
            <p class="text-2xl font-bold text-emerald-600">${onRoute}</p>
            <p class="text-xs font-semibold text-slate-500 mt-0.5">On-Route Buses</p>
          </div>
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-xl bg-rose-100 flex items-center justify-center">
                <svg class="w-5 h-5 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
              </div>
            </div>
            <p class="text-2xl font-bold text-rose-600">${offRoute}</p>
            <p class="text-xs font-semibold text-slate-500 mt-0.5">Off-Route Buses</p>
          </div>
        `;
    }

    // ─── Build horizontal stop list ───
    function buildStopTimeline(stops, coords, routeCode, dotColor) {
      return `<div class="stops-row">${stops.map((stop, i) => {
        const isLast = i === stops.length - 1;
        const isFirst = i === 0;
        const filled = isFirst || isLast;
        const coord = coords && coords[stop] ? coords[stop] : null;
        const tooltip = coord ? ` title="${coord[0].toFixed(4)}°N, ${coord[1].toFixed(4)}°E"` : '';
        const arrow = !isLast ? `<svg class="stop-arrow w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>` : '';
        return `<span class="stop-chip"${tooltip}><span class="stop-chip-dot" style="background:${filled ? dotColor : dotColor + '44'};border:2px solid ${dotColor}"></span><span class="text-xs font-semibold ${filled ? 'text-slate-800' : 'text-slate-600'}">${stop}</span></span>${arrow}`;
      }).join('')}</div>`;
    }

    // ─── Render Bus Cards ───
    function renderBusList(filter = 'all', search = '') {
      const container = document.getElementById('bus-list');
      const searchLower = search.toLowerCase();

      const filtered = busFleet.filter(bus => {
        const matchStatus = filter === 'all' || bus.status === filter;

        const route = detailedRoutes[bus.routeCode];
        const allStops = route ? [...(route.AM?.stops || []), ...(route.PM?.stops || [])] : [];
        const stopsText = allStops.join(' ').toLowerCase();

        const matchSearch = !search ||
          bus.id.toLowerCase().includes(searchLower) ||
          bus.plateNumber.toLowerCase().includes(searchLower) ||
          bus.routeCode.toLowerCase().includes(searchLower) ||
          (bus.operator || '').toLowerCase().includes(searchLower) ||
          stopsText.includes(searchLower);

        return matchStatus && matchSearch;
      });

      if (filtered.length === 0) {
        container.innerHTML = `
            <div class="bg-white rounded-2xl border border-slate-200 p-12 text-center shadow-sm">
              <svg class="w-12 h-12 mx-auto text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <p class="text-slate-500 font-semibold">No buses found</p>
              <p class="text-sm text-slate-400 mt-1">Try adjusting your search or filter</p>
            </div>
          `;
        return;
      }

      container.innerHTML = filtered.map((bus, index) => {
        const route = detailedRoutes[bus.routeCode];
        const coords = stopCoordinates[bus.routeCode] || {};
        const colors = routeColors[bus.routeCode] || routeColors.R102;
        const st = statusConfig[bus.status];
        const amStops = route?.AM?.stops || [];
        const pmStops = route?.PM?.stops || [];
        const amTitle = route?.AM?.title || 'AM Route';
        const pmTitle = route?.PM?.title || 'PM Route';
        const totalStops = new Set([...amStops, ...pmStops]).size;
        const firstStop = amStops[0] || '—';
        const lastStop = amStops[amStops.length - 1] || '—';

        return `
            <div class="bus-card bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden" data-bus-id="${bus.id}">
              <!-- Card Header -->
              <div class="p-6 cursor-pointer" onclick="toggleRoute('${bus.id}')">
                <div class="flex items-start justify-between gap-4">
                  <!-- Left: Bus info -->
                  <div class="flex items-start gap-4 flex-1 min-w-0">
                    <!-- Bus icon -->
                    <div class="w-12 h-12 rounded-xl ${colors.bg} flex items-center justify-center flex-shrink-0">
                      <svg class="w-6 h-6 ${colors.text}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/>
                      </svg>
                    </div>
                    <!-- Info -->
                    <div class="min-w-0">
                      <div class="flex items-center gap-2 flex-wrap">
                        <h3 class="text-base font-bold text-slate-900">${bus.id}</h3>
                        <span class="inline-flex items-center ${colors.bg} ${colors.text} text-xs font-bold px-2.5 py-0.5 rounded-lg">${bus.routeCode}</span>
                        <span class="inline-flex items-center gap-1.5 ${st.badgeBg} ${st.badgeText} text-xs font-bold px-2.5 py-0.5 rounded-lg">
                          <span class="w-1.5 h-1.5 rounded-full ${st.dotClass} ${bus.status === 'active' ? 'status-pulse' : ''}"></span>
                          ${st.label}
                        </span>
                      </div>
                      <p class="text-sm text-slate-500 mt-1">${bus.plateNumber} &bull; ${bus.year} Model &bull; 90 Seats</p>
                      <!-- Route summary -->
                      <div class="flex items-center gap-2 mt-2 text-xs text-slate-500">
                        <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span class="font-semibold text-slate-700">${firstStop}</span>
                        <svg class="w-3 h-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                        <span class="font-semibold text-slate-700">${lastStop}</span>
                        <span class="text-slate-400">&bull; ${totalStops} stops</span>
                      </div>
                    </div>
                  </div>

                  <!-- Right: Operator + Expand -->
                  <div class="flex items-center gap-4 flex-shrink-0">
                    <div class="hidden md:block text-right">
                      <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Operator</p>
                      <p class="text-sm font-semibold text-slate-800">${bus.operator || '—'}</p>
                    </div>
                    <svg class="expand-btn w-5 h-5 text-slate-400" id="expand-${bus.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </div>
                </div>

                <!-- Mobile operator info -->
                <div class="md:hidden mt-3 pt-3 border-t border-slate-100 flex gap-6 text-sm">
                  <div><span class="text-slate-400 text-xs font-bold">Operator:</span> <span class="font-semibold text-slate-800">${bus.operator || '—'}</span></div>
                </div>
              </div>

              <!-- Expandable Route Detail -->
              <div class="route-detail" id="detail-${bus.id}">
                <div class="px-6 pb-6 pt-4 border-t border-slate-100">

                  <!-- Bus Credentials & Operator Info -->
                  <div class="grid gap-3 sm:grid-cols-2 md:grid-cols-4 mb-5">
                    <div class="rounded-xl border border-cyan-200 bg-cyan-50 p-3">
                      <p class="text-[10px] font-bold uppercase tracking-wider text-cyan-600">Bus Login ID</p>
                      <p class="mt-1 text-sm font-extrabold text-slate-900">${bus.busLoginId || '—'}</p>
                    </div>
                    <div class="rounded-xl border border-cyan-200 bg-cyan-50 p-3">
                      <p class="text-[10px] font-bold uppercase tracking-wider text-cyan-600">Bus Login Code</p>
                      <p class="mt-1 text-sm font-extrabold text-slate-900 font-mono">${bus.busLoginCode || '—'}</p>
                    </div>
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
                      <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Operator</p>
                      <p class="mt-1 text-sm font-bold text-slate-900">${bus.operator || '—'}</p>
                    </div>
                  </div>

                  <!-- Edit Button -->
                  <button type="button" onclick="openEditModal(${index}); event.stopPropagation();" class="mb-5 inline-flex items-center gap-2 rounded-xl border border-cyan-300 bg-cyan-50 px-4 py-2 text-xs font-bold text-cyan-700 transition hover:bg-cyan-100">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    Edit Credentials & Details
                  </button>

                  <!-- AM / PM Tabs -->
                  <div class="flex gap-2 mb-5">
                    <button class="tab-btn active text-xs font-bold px-4 py-2 rounded-lg" onclick="switchTab('${bus.id}', 'am', event)" id="tab-am-${bus.id}">
                      AM Stops
                    </button>
                    <button class="tab-btn text-xs font-bold px-4 py-2 rounded-lg bg-slate-100 text-slate-600" onclick="switchTab('${bus.id}', 'pm', event)" id="tab-pm-${bus.id}">
                      PM Stops
                    </button>
                  </div>

                  <!-- AM Stops -->
                  <div class="tab-content" id="stops-am-${bus.id}">
                    ${buildStopTimeline(amStops, coords, bus.routeCode, colors.dot)}
                  </div>

                  <!-- PM Stops -->
                  <div class="tab-content hidden" id="stops-pm-${bus.id}">
                    ${buildStopTimeline(pmStops, coords, bus.routeCode, colors.dot)}
                  </div>
                </div>
              </div>
            </div>
          `;
      }).join('');
    }

    // ─── Toggle expand/collapse ───
    function toggleRoute(busId) {
      const detail = document.getElementById('detail-' + busId);
      const arrow = document.getElementById('expand-' + busId);
      detail.classList.toggle('open');
      arrow.classList.toggle('rotated');
    }

    // ─── Switch AM / PM tabs ───
    function switchTab(busId, period, event) {
      event.stopPropagation();
      const amTab = document.getElementById('tab-am-' + busId);
      const pmTab = document.getElementById('tab-pm-' + busId);
      const amStops = document.getElementById('stops-am-' + busId);
      const pmStops = document.getElementById('stops-pm-' + busId);

      if (period === 'am') {
        amTab.classList.add('active');
        amTab.classList.remove('bg-slate-100', 'text-slate-600');
        pmTab.classList.remove('active');
        pmTab.classList.add('bg-slate-100', 'text-slate-600');
        amStops.classList.remove('hidden');
        pmStops.classList.add('hidden');
      } else {
        pmTab.classList.add('active');
        pmTab.classList.remove('bg-slate-100', 'text-slate-600');
        amTab.classList.remove('active');
        amTab.classList.add('bg-slate-100', 'text-slate-600');
        pmStops.classList.remove('hidden');
        amStops.classList.add('hidden');
      }
    }

    // ─── Edit Modal ───
    function openEditModal(busIndex) {
      const bus = busFleet[busIndex];
      if (!bus) return;
      document.getElementById('editBusIndex').value = busIndex;
      document.getElementById('editModalTitle').textContent = bus.id + ' — ' + bus.routeCode;
      document.getElementById('editBusLoginId').value = bus.busLoginId || '';
      document.getElementById('editBusLoginCode').value = bus.busLoginCode || '';
      document.getElementById('editBusOperator').value = bus.operator || '';
      document.getElementById('editBusPlate').value = bus.plateNumber || '';
      document.getElementById('editBusModal').classList.remove('hidden');
    }

    function closeEditModal() {
      document.getElementById('editBusModal').classList.add('hidden');
    }

    document.getElementById('editBusForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const idx = parseInt(document.getElementById('editBusIndex').value);
      const bus = busFleet[idx];
      if (!bus) return;

      bus.busLoginId = document.getElementById('editBusLoginId').value.trim();
      bus.busLoginCode = document.getElementById('editBusLoginCode').value.trim();
      bus.operator = document.getElementById('editBusOperator').value.trim();
      bus.plateNumber = document.getElementById('editBusPlate').value.trim();

      saveFleet();
      closeEditModal();
      renderBusList(
        document.getElementById('filterStatus').value,
        document.getElementById('searchInput').value
      );
    });

    // ─── Event Listeners ───
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderBusList(document.getElementById('filterStatus').value, e.target.value);
    });
    document.getElementById('filterStatus').addEventListener('change', (e) => {
      renderBusList(e.target.value, document.getElementById('searchInput').value);
    });

    // ─── Init ───
    window.addEventListener('DOMContentLoaded', () => {
      const session = sessionStorage.getItem('dc-bus-superadmin-session');
      if (session) {
        const data = JSON.parse(session);
        document.getElementById('adminUsername').textContent = data.username || 'Super Admin';
      }
      renderSummary();
      renderBusList();
    });

    // Logout
    function handleLogout() {
      document.getElementById('logoutModal').classList.remove('hidden');
    }
    function closeLogoutModal() {
      document.getElementById('logoutModal').classList.add('hidden');
    }
    function confirmLogout() {
      sessionStorage.removeItem('dc-bus-superadmin-session');
      window.location.href = '../login-superadmin.html';
    }
  </script>

  <!-- Logout Confirmation Modal -->
  <div id="logoutModal" class="hidden fixed inset-0 z-[999] flex items-center justify-center">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeLogoutModal()"></div>
    <div class="relative w-full max-w-sm mx-4 bg-white rounded-2xl shadow-xl p-6 text-center">
      <div class="mx-auto mb-4 h-12 w-12 rounded-full bg-rose-100 flex items-center justify-center">
        <svg class="w-6 h-6 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-900 mb-1">Logout</h3>
      <p class="text-sm text-slate-500 mb-6">Are you sure you want to logout from the admin panel?</p>
      <div class="flex items-center gap-3">
        <button onclick="closeLogoutModal()"
          class="flex-1 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Cancel</button>
        <button onclick="confirmLogout()"
          class="flex-1 rounded-xl bg-rose-600 px-4 py-2.5 text-sm font-bold text-white transition hover:bg-rose-700">Logout</button>
      </div>
    </div>
  </div>
</body>

</html>
