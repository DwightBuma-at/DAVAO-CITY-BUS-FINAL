</head>

        <!-- Search & Filter -->
        <div class="flex flex-wrap items-center gap-3 mb-6">

            <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none"

            <input type="text" id="searchInput" placeholder="Search by operator, bus, route..."

            <option value="turn_off">Turn Off Route</option>
          </select>
          <select id="filterBus"
            class="px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-500">
            <option value="all">All Routes</option>
            <!-- Populated by JS -->
          </select>
        </div>

        <!-- Logs Table -->
        <div class="rounded-3xl border border-slate-200 bg-white shadow-lg overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-left border-b border-slate-200 bg-slate-50">

                  <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Operator</th>
                  <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Bus</th>
                  <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Details</th>
                </tr>
              </thead>
              <tbody id="logsBody" class="divide-y divide-slate-100">
                <!-- Injected by JS -->
              </tbody>
            </table>
          </div>

          <!-- Empty State -->
          <div id="emptyState" class="hidden p-12 text-center">
            <svg class="w-12 h-12 mx-auto text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <p class="text-slate-500 font-semibold">No logs found</p>
            <p class="text-sm text-slate-400 mt-1">Try adjusting your search or filter</p>

          <!-- Pagination -->
          <div id="pagination" class="flex items-center justify-between border-t border-slate-200 px-6 py-4">
            <!-- Injected by JS -->
          </div>

    </main>
  </div>

  <script>
    // ─── Static Audit Log Data ───
    const auditLogs = [
      { timestamp: '2026-03-07 06:02:14', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },
      { timestamp: '2026-03-07 06:05:32', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },

      { timestamp: '2026-03-07 06:10:18', operator: 'Roberto Aquino', bus: 'BUS-005', route: 'R503', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },
      { timestamp: '2026-03-07 06:12:55', operator: 'Antonio Ramos', bus: 'BUS-006', route: 'R603', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },
      { timestamp: '2026-03-07 06:15:03', operator: 'Francisco Bautista', bus: 'BUS-007', route: 'R763', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },

      { timestamp: '2026-03-07 09:55:10', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 09:57:22', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 09:58:40', operator: 'Carlos Mendoza', bus: 'BUS-003', route: 'R402', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 09:59:15', operator: 'Roberto Aquino', bus: 'BUS-005', route: 'R503', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 10:00:30', operator: 'Antonio Ramos', bus: 'BUS-006', route: 'R603', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 10:01:05', operator: 'Francisco Bautista', bus: 'BUS-007', route: 'R763', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 10:02:50', operator: 'Eduardo Santiago', bus: 'BUS-009', route: 'R793', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-07 16:01:08', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-07 16:03:44', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-07 16:05:20', operator: 'Carlos Mendoza', bus: 'BUS-003', route: 'R402', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-07 16:07:55', operator: 'Roberto Aquino', bus: 'BUS-005', route: 'R503', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-07 16:10:12', operator: 'Antonio Ramos', bus: 'BUS-006', route: 'R603', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-07 16:12:30', operator: 'Francisco Bautista', bus: 'BUS-007', route: 'R763', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-07 16:15:48', operator: 'Eduardo Santiago', bus: 'BUS-009', route: 'R793', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-06 06:04:22', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },
      { timestamp: '2026-03-06 06:07:11', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_on', detail: 'Turned ON Route — AM Period started' },
      { timestamp: '2026-03-06 09:52:18', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-06 09:56:44', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_off', detail: 'Turned OFF Route — AM Period ended' },
      { timestamp: '2026-03-06 16:02:30', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-06 16:04:15', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_on', detail: 'Turned ON Route — PM Period started' },
      { timestamp: '2026-03-06 20:55:40', operator: 'Juan Dela Cruz', bus: 'BUS-001', route: 'R102', action: 'turn_off', detail: 'Turned OFF Route — PM Period ended' },
      { timestamp: '2026-03-06 20:58:12', operator: 'Pedro Reyes', bus: 'BUS-002', route: 'R103', action: 'turn_off', detail: 'Turned OFF Route — PM Period ended' },
    ];

    // Sort newest first
    auditLogs.sort((a, b) => b.timestamp.localeCompare(a.timestamp));

    // Route colors
    const routeBadgeColors = {
      R102: 'bg-purple-100 text-purple-700',
      R103: 'bg-orange-100 text-orange-700',
      R402: 'bg-blue-100 text-blue-700',
      R403: 'bg-green-100 text-green-700',
      R503: 'bg-yellow-100 text-yellow-700',
      R603: 'bg-pink-100 text-pink-700',
      R763: 'bg-green-100 text-green-700',
      R783: 'bg-orange-100 text-orange-700',
      R793: 'bg-blue-100 text-blue-700',
    };

    // ─── Render Summary ───
    function renderSummary() {
      const totalLogs = auditLogs.length;

      document.getElementById('summary-cards').innerHTML = `
        <div class="rounded-2xl border border-slate-200 bg-white px-5 py-4 shadow-sm">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Total Logs</p>
              <p class="mt-1 text-2xl font-extrabold text-slate-900">${totalLogs}</p>
            </div>
            <div class="h-10 w-10 rounded-xl bg-cyan-100 flex items-center justify-center">
              <svg class="w-5 h-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
          </div>
        </div>
      `;
    }

    const ROWS_PER_PAGE = 10;
    let currentPage = 1;

    // ─── Render Logs Table ───
    function renderLogs(filter = 'all', search = '', busFilter = 'all', page = 1) {
      const tbody = document.getElementById('logsBody');
      const emptyState = document.getElementById('emptyState');
      const paginationEl = document.getElementById('pagination');
      const searchLower = search.toLowerCase();

      const filtered = auditLogs.filter(log => {
        const matchAction = filter === 'all' || log.action === filter;
        const matchBus = busFilter === 'all' || log.route === busFilter;
        const matchSearch = !search ||
          log.operator.toLowerCase().includes(searchLower) ||
          log.bus.toLowerCase().includes(searchLower) ||
          log.route.toLowerCase().includes(searchLower) ||
          log.detail.toLowerCase().includes(searchLower) ||
          log.timestamp.includes(searchLower);
        return matchAction && matchBus && matchSearch;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        paginationEl.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');

      // Pagination
      const totalPages = Math.ceil(filtered.length / ROWS_PER_PAGE);
      currentPage = Math.min(page, totalPages);
      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const end = start + ROWS_PER_PAGE;
      const pageItems = filtered.slice(start, end);

      tbody.innerHTML = pageItems.map(log => {
        const isOn = log.action === 'turn_on';
        const actionBadge = isOn
          ? '<span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold text-emerald-700"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Turn ON</span>'
          : '<span class="inline-flex items-center gap-1.5 rounded-full bg-rose-100 px-3 py-1 text-xs font-bold text-rose-700"><span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>Turn OFF</span>';

        const routeColor = routeBadgeColors[log.route] || 'bg-slate-100 text-slate-700';

        // Format: Month Day Year - HH:MM:SS
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const [datePart, timePart] = log.timestamp.split(' ');
        const [yr, mo, dy] = datePart.split('-');
        const formatted = months[parseInt(mo) - 1] + ' ' + dy + ' ' + yr + ' - ' + timePart;

        return `
          <tr class="log-row">
            <td class="px-6 py-4">
              <p class="text-sm font-semibold text-slate-800">${formatted}</p>
            </td>
            <td class="px-6 py-4">
              <p class="text-sm font-bold text-slate-900">${log.operator}</p>
            </td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-2">
                <span class="text-sm font-semibold text-slate-800">${log.bus}</span>
                <span class="text-xs font-bold px-2 py-0.5 rounded-lg ${routeColor}">${log.route}</span>
              </div>
            </td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                ${actionBadge}
                <span class="text-sm text-slate-600">${log.detail}</span>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // Render pagination
      let pageButtons = '';
      for (let i = 1; i <= totalPages; i++) {
        const active = i === currentPage
          ? 'bg-cyan-500 text-white shadow-sm'
          : 'bg-white text-slate-700 hover:bg-slate-100';
        pageButtons += `<button onclick="goToPage(${i})" class="h-9 w-9 rounded-lg text-xs font-bold ${active} border border-slate-200 transition">${i}</button>`;
      }

      paginationEl.innerHTML = `
        <p class="text-xs text-slate-500">Showing <span class="font-bold text-slate-700">${start + 1}–${Math.min(end, filtered.length)}</span> of <span class="font-bold text-slate-700">${filtered.length}</span> entries</p>
        <div class="flex items-center gap-1">
          <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="h-9 px-3 rounded-lg text-xs font-bold border border-slate-200 transition ${currentPage === 1 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-700 hover:bg-slate-100'}">← Prev</button>
          ${pageButtons}
          <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="h-9 px-3 rounded-lg text-xs font-bold border border-slate-200 transition ${currentPage === totalPages ? 'text-slate-300 cursor-not-allowed' : 'text-slate-700 hover:bg-slate-100'}">Next →</button>
        </div>
      `;
    }

    function goToPage(page) {
      if (page < 1) return;
      triggerFilterWithPage(page);
    }

    function triggerFilter() {
      currentPage = 1;
      renderLogs(
        document.getElementById('filterAction').value,
        document.getElementById('searchInput').value,
        document.getElementById('filterBus').value,
        1
      );
    }

    function triggerFilterWithPage(page) {
      renderLogs(
        document.getElementById('filterAction').value,
        document.getElementById('searchInput').value,
        document.getElementById('filterBus').value,
        page
      );
    }

    // ─── Event Listeners ───
    document.getElementById('searchInput').addEventListener('input', triggerFilter);
    document.getElementById('filterAction').addEventListener('change', triggerFilter);
    document.getElementById('filterBus').addEventListener('change', triggerFilter);

    // ─── Populate route dropdown ───
    function populateBusFilter() {
      const routes = [...new Set(auditLogs.map(l => l.route))].sort();
      const select = document.getElementById('filterBus');
      routes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route;
        opt.textContent = route;
        select.appendChild(opt);
      });
    }

    // ─── Init ───
    window.addEventListener('DOMContentLoaded', () => {
      const session = sessionStorage.getItem('dc-bus-superadmin-session');
      if (session) {
        const data = JSON.parse(session);
        document.getElementById('adminUsername').textContent = data.username || 'Super Admin';
      }
      populateBusFilter();
      renderSummary();
      renderLogs();
    });

    // Logout
    function handleLogout() {
      document.getElementById('logoutModal').classList.remove('hidden');
    }
    function closeLogoutModal() {
      document.getElementById('logoutModal').classList.add('hidden');
    }
    function confirmLogout() {
      sessionStorage.removeItem('dc-bus-superadmin-session');
      window.location.href = '../login-superadmin.html';
    }
  </script>

  <!-- Logout Confirmation Modal -->
  <div id="logoutModal" class="hidden fixed inset-0 z-[999] flex items-center justify-center">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeLogoutModal()"></div>
    <div class="relative w-full max-w-sm mx-4 bg-white rounded-2xl shadow-xl p-6 text-center">
      <div class="mx-auto mb-4 h-12 w-12 rounded-full bg-rose-100 flex items-center justify-center">
        <svg class="w-6 h-6 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-900 mb-1">Logout</h3>
      <p class="text-sm text-slate-500 mb-6">Are you sure you want to logout from the admin panel?</p>
      <div class="flex items-center gap-3">
        <button onclick="closeLogoutModal()"
          class="flex-1 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Cancel</button>
        <button onclick="confirmLogout()"
          class="flex-1 rounded-xl bg-rose-600 px-4 py-2.5 text-sm font-bold text-white transition hover:bg-rose-700">Logout</button>
      </div>
    </div>
  </div>
</body>

</html>
