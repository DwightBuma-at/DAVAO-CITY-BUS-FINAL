<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DC Bus Live Dashboard</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
			integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
			crossorigin=""
		/>
		<style>
			body {
				font-family: "Manrope", sans-serif;
				background:
					radial-gradient(circle at top left, rgba(6, 182, 212, 0.12), transparent 32%),
					radial-gradient(circle at top right, rgba(15, 23, 42, 0.08), transparent 28%),
					#f8fafc;
			}

			.panel-shadow {
				box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
			}

			#dashboardRouteMap {
				height: 22rem;
				border-radius: 1rem;
				border: 1px solid #cbd5e1;
				overflow: hidden;
			}

			#dashboardRouteMap .leaflet-control-zoom a {
				color: #0f172a;
			}

			.dashboard-waypoint-pin {
				height: 1.35rem;
				width: 1.35rem;
				border-radius: 9999px;
				border: 2px solid #ffffff;
				box-shadow: 0 5px 12px rgba(2, 6, 23, 0.2);
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 0.68rem;
				font-weight: 800;
				color: #ffffff;
			}

			.r102-bus-start-icon {
				display: flex;
				height: 28px;
				width: 28px;
				align-items: center;
				justify-content: center;
				font-size: 22px;
				line-height: 1;
				filter: drop-shadow(0 2px 4px rgba(15, 23, 42, 0.35));
			}

			.dashboard-route-stops-grid {
				display: grid;
				gap: 0.5rem;
			}

			@media (min-width: 640px) {
				.dashboard-route-stops-grid {
					grid-auto-flow: column;
					grid-auto-columns: minmax(12rem, 1fr);
					grid-template-rows: repeat(5, minmax(0, auto));
				}
			}
		</style>
	</head>
	<body class="min-h-screen text-slate-900">
		<div class="min-h-screen bg-gradient-to-b from-cyan-50 via-white to-slate-50">
			<header class="fixed left-0 right-0 top-0 z-50 border-b border-slate-200 bg-white shadow-sm">
				<div class="mx-auto flex h-24 w-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
					<button id="topLogoButton" type="button" class="inline-flex shrink-0 items-center rounded-md p-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500" aria-label="Scroll to top">
						<img src="assets/dcbuslogo.png" alt="DC Bus logo" class="h-14 w-auto sm:h-16" />
					</button>

					<button id="topLogoutButton" type="button" class="hidden rounded-xl border border-rose-300 bg-rose-50 px-4 py-2 text-xs font-extrabold uppercase tracking-[0.14em] text-rose-700 transition hover:bg-rose-100">
						Logout
					</button>
				</div>
			</header>

			<main class="mx-auto w-full max-w-5xl px-4 pb-12 pt-28 sm:px-6 lg:px-8">
				<section id="dashboardShell" class="space-y-6"></section>
			</main>

			<div id="logoutConfirmModal" class="fixed inset-0 hidden items-center justify-center bg-slate-900/35 p-4 backdrop-blur-sm" style="z-index: 2100;">
				<div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-white p-6 shadow-xl">
					<div class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-rose-100 text-rose-600" aria-hidden="true">
						<svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-7.5a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 006 21h7.5a2.25 2.25 0 002.25-2.25V15" />
							<path stroke-linecap="round" stroke-linejoin="round" d="M18 12H9m9 0l-3-3m3 3l-3 3" />
						</svg>
					</div>
					<h2 id="logoutConfirmTitle" class="mt-4 text-xl font-extrabold text-slate-900">Logout from dashboard?</h2>
					<p id="logoutConfirmMessage" class="mt-2 text-sm leading-relaxed text-slate-600">Your current operator session will end and you will return to the bus list.</p>

					<div class="mt-6 flex justify-end gap-2">
						<button id="logoutConfirmCancel" type="button" class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
							Cancel
						</button>
						<button id="logoutConfirmProceed" type="button" class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-extrabold text-white transition hover:bg-rose-700">
							Logout
						</button>
					</div>
				</div>
			</div>
		</div>

		<script src="assets/route-status-sync.js"></script>
		<script
			src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
			integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
			crossorigin=""
		></script>
		<script src="assets/road-routing.js"></script>
		<script src="assets/route-map-data.js"></script>
		<script>
			const routeStore = window.dcBusStatusSync;
			const roadRouting = window.dcBusRoadRouting;
			const OPERATOR_SESSION_KEY = 'dc-bus-operator-session-v1';
			const dashboardShell = document.getElementById('dashboardShell');

			let latestCoords = null;
			let locationPermissionState = 'checking';
			let locationWatchId = null;
			let permissionStatusHandle = null;

			function readOperatorSession() {
				try {
					return JSON.parse(sessionStorage.getItem(OPERATOR_SESSION_KEY) || 'null');
				} catch (error) {
					return null;
				}
			}

			const operatorSession = readOperatorSession();
			const routeMeta = operatorSession && routeStore ? routeStore.getRouteMeta(operatorSession.routeId) : null;
			const routeMapData = window.dcBusRouteMapData || { defaultCenter: [7.0731, 125.6128], detailedRoutes: {}, stopCoordinates: {} };

			let dashboardMap = null;
			let dashboardPolylineLayer = null;
			let dashboardMarkerLayer = null;
			let dashboardMapViewKey = null;
			let activeMapPeriod = 'AM';
			let dashboardRenderToken = 0;
			let routeActivationResolver = null;
			let logoutConfirmationResolver = null;
			let routeActivationAction = 'on';
			let isTurningOnRoute = false;
			let simulationTimerId = null;
			let simulationPeriod = null;
			let simulationSegmentIndex = 0;
			let simulationSegmentStep = 0;
			let simulationStopPoints = [];
			const reachedStopIndexByPeriod = { AM: -1, PM: -1 };
			const SIMULATION_STEPS_PER_SEGMENT = 12;
			const SIMULATION_TICK_MS = 850;
			const GEO_PERMISSION_DENIED = 1;
			const GEO_POSITION_UNAVAILABLE = 2;
			const GEO_TIMEOUT = 3;

			function formatTimestamp(value) {
				if (!value) {
					return 'No live update yet';
				}

				const date = new Date(value);
				if (Number.isNaN(date.getTime())) {
					return 'No live update yet';
				}

				return date.toLocaleString([], {
					month: 'short',
					day: 'numeric',
					hour: 'numeric',
					minute: '2-digit'
				});
			}

			function formatCoords(coords) {
				if (!coords) {
					return 'No GPS fix yet';
				}

				return `${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`;
			}

			function clearOperatorSession() {
				sessionStorage.removeItem(OPERATOR_SESSION_KEY);
			}

			function renderMissingSession() {
				dashboardShell.innerHTML = `
					<section class="rounded-3xl border border-slate-200 bg-white p-8 text-center panel-shadow">
						<p class="text-sm font-semibold uppercase tracking-[0.25em] text-slate-500">Bus Dashboard</p>
						<h1 class="mt-3 text-3xl font-extrabold text-slate-900">No bus selected</h1>
						<p class="mx-auto mt-3 max-w-2xl text-sm leading-relaxed text-slate-600 sm:text-base">
							Go back to the bus list, choose a route, and log in with the Bus ID and Bus Code first.
						</p>
						<a href="bus.html" class="mt-6 inline-flex items-center rounded-2xl bg-cyan-600 px-5 py-3 text-sm font-extrabold uppercase tracking-[0.18em] text-white transition hover:bg-cyan-700">
							Back to Bus List
						</a>
					</section>
				`;
			}

			function renderDashboardShell() {
				dashboardShell.innerHTML = `
					<div id="dashboardAlert" class="hidden rounded-2xl border px-4 py-3 text-sm font-semibold panel-shadow"></div>

					<article class="overflow-hidden rounded-3xl border border-slate-200 bg-white panel-shadow">
						<div class="p-6 text-white" style="background:${routeMeta.color};">
							<div class="flex flex-wrap items-center justify-between gap-3">
								<div class="inline-flex items-center gap-3">
									<span class="inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-lg bg-white/90 px-2 text-xs font-extrabold" style="color:${routeMeta.color};">
										${routeMeta.id}
									</span>
									<div>
										<p class="text-xs font-semibold uppercase tracking-[0.25em] text-white/75">Selected Bus</p>
										<h1 class="text-2xl font-extrabold sm:text-3xl">${routeMeta.name}</h1>
									</div>
								</div>

								<span id="dashboardStatusBadge" class="rounded-full bg-white/90 px-4 py-1.5 text-xs font-bold text-slate-900">Status</span>
							</div>
						</div>

						<div class="p-6">
							<div class="grid gap-4 md:grid-cols-3">
								<div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
									<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Bus ID</p>
									<p id="dashboardBusId" class="mt-2 text-lg font-extrabold text-slate-900"></p>
									<p class="mt-1 text-xs text-slate-600">Logged-in bus operator session.</p>
								</div>

								<div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
									<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Location</p>
									<p id="dashboardLocationState" class="mt-2 text-lg font-extrabold text-slate-900"></p>
									<p id="dashboardLocationHint" class="mt-1 text-xs text-slate-600"></p>
								</div>

								<div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
									<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Last Sync</p>
									<p id="dashboardLastSync" class="mt-2 text-lg font-extrabold text-slate-900"></p>
									<p class="mt-1 text-xs text-slate-600">Latest route status update.</p>
								</div>
							</div>

							<div class="mt-4 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-slate-200 bg-slate-50 p-3 sm:p-4">
								<div>
									<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Passenger Load</p>
									<p id="dashboardPassengerLoadValue" class="mt-1 text-sm font-bold text-slate-900">Available</p>
								</div>

								<div class="inline-flex rounded-xl border border-slate-300 bg-white p-1">
									<button data-dashboard-load="Available" type="button" class="rounded-lg px-3 py-1.5 text-xs font-semibold transition">Available</button>
									<button data-dashboard-load="Standing" type="button" class="rounded-lg px-3 py-1.5 text-xs font-semibold transition">Standing</button>
									<button data-dashboard-load="Full" type="button" class="rounded-lg px-3 py-1.5 text-xs font-semibold transition">Full</button>
								</div>
							</div>

							<div class="mt-6 flex flex-col gap-3 lg:flex-row lg:items-stretch lg:justify-between">
								<div class="rounded-2xl border border-cyan-300 bg-cyan-50/50 p-4 text-left text-[13px] leading-relaxed text-slate-800 sm:text-sm lg:flex-1 lg:max-w-2xl">
									<div class="flex items-start gap-3">
										<span class="mt-0.5 inline-flex h-5 w-5 shrink-0 items-center justify-center text-slate-700" aria-hidden="true">
											<svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
												<circle cx="12" cy="12" r="9" />
												<path stroke-linecap="round" stroke-linejoin="round" d="M12 8h.01M11 12h2v4h-2" />
											</svg>
										</span>
										<div>
											<p class="font-bold">Bus Dashboard</p>
											<p>
												Turn location on, then use the button beside this card to set this bus to <span class="font-semibold">On-Route</span>. The passenger page reads the same status live from this bus.
											</p>
										</div>
									</div>
								</div>

								<button id="dashboardActionButton" type="button" class="inline-flex w-full items-center justify-center rounded-2xl border px-5 py-3 text-sm font-extrabold uppercase tracking-[0.18em] transition hover:opacity-90 lg:w-auto lg:min-w-64">
									Toggle Route
								</button>
							</div>

							<section class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 sm:p-5">
								<div class="flex flex-wrap items-center justify-between gap-3">
									<div>
										<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Route Map</p>
										<p id="dashboardRouteTitle" class="mt-1 text-sm font-bold text-slate-800"></p>
									</div>
									<div class="flex flex-wrap items-center gap-2">
										<div class="inline-flex rounded-xl border border-slate-300 bg-white p-1">
											<button id="mapAmToggle" type="button" class="rounded-lg px-3 py-1.5 text-xs font-bold uppercase tracking-[0.12em] transition">AM</button>
											<button id="mapPmToggle" type="button" class="rounded-lg px-3 py-1.5 text-xs font-bold uppercase tracking-[0.12em] transition">PM</button>
										</div>
										<button id="simulateRouteButton" type="button" class="rounded-xl border border-cyan-600 bg-cyan-600 px-3 py-1.5 text-xs font-extrabold uppercase tracking-[0.12em] text-white transition hover:bg-cyan-700">
											Simulate
										</button>
									</div>
								</div>

								<div id="dashboardRouteMap" class="mt-4"></div>
								<ol id="dashboardRouteStops" class="dashboard-route-stops-grid mt-4 text-xs text-slate-700"></ol>
							</section>
						</div>
					</article>

					<div id="routeActivationModal" class="fixed inset-0 hidden items-center justify-center bg-slate-950/45 p-4" style="z-index: 2000;">
						<div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-white p-5 shadow-2xl">
							<p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Confirmation</p>
							<h2 id="routeActivationTitle" class="mt-2 text-xl font-extrabold text-slate-900">Turn ${routeMeta.id} On-Route?</h2>
							<p id="routeActivationMessage" class="mt-2 text-sm text-slate-600">This bus will be shown as active to passengers.</p>

							<div class="mt-5 flex justify-end gap-3">
								<button id="routeActivationCancel" type="button" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
									Cancel
								</button>
								<button id="routeActivationConfirm" type="button" class="rounded-xl px-4 py-2 text-sm font-extrabold uppercase tracking-[0.14em] text-white transition hover:opacity-90" style="background:#22c55e;">
									Confirm
								</button>
							</div>
						</div>
					</div>
				`;
			}

			function getDashboardAlert() {
				return document.getElementById('dashboardAlert');
			}

			function initializeTopLogoButton() {
				const topLogoButton = document.getElementById('topLogoButton');
				if (!topLogoButton || topLogoButton.dataset.bound === 'true') {
					return;
				}

				topLogoButton.dataset.bound = 'true';
				topLogoButton.addEventListener('click', () => {
					window.scrollTo({
						top: 0,
						behavior: 'smooth'
					});
				});
			}

			function getTopLogoutButton() {
				return document.getElementById('topLogoutButton');
			}

			function setTopLogoutButtonVisibility(isVisible) {
				const topLogoutButton = getTopLogoutButton();
				if (!topLogoutButton) {
					return;
				}

				topLogoutButton.classList.toggle('hidden', !isVisible);
			}

			function getLogoutConfirmModalElements() {
				return {
					modal: document.getElementById('logoutConfirmModal'),
					cancelButton: document.getElementById('logoutConfirmCancel'),
					confirmButton: document.getElementById('logoutConfirmProceed')
				};
			}

			function resolveLogoutConfirmation(confirmed) {
				const modalElements = getLogoutConfirmModalElements();

				if (modalElements.modal) {
					modalElements.modal.classList.add('hidden');
					modalElements.modal.classList.remove('flex');
				}

				document.body.classList.remove('overflow-hidden');

				if (typeof logoutConfirmationResolver === 'function') {
					logoutConfirmationResolver(Boolean(confirmed));
				}

				logoutConfirmationResolver = null;
			}

			function requestLogoutConfirmation() {
				const modalElements = getLogoutConfirmModalElements();

				if (!modalElements.modal) {
					return Promise.resolve(false);
				}

				if (logoutConfirmationResolver || routeActivationResolver) {
					return Promise.resolve(false);
				}

				modalElements.modal.classList.remove('hidden');
				modalElements.modal.classList.add('flex');
				document.body.classList.add('overflow-hidden');

				return new Promise((resolve) => {
					logoutConfirmationResolver = resolve;
				});
			}

			function logoutOperatorSession() {
				resolveRouteActivation(false);
				stopRouteSimulation();
				stopLocationWatch();
				clearOperatorSession();
				window.location.href = 'bus.html';
			}

			function getRouteActivationModalElements() {
				return {
					modal: document.getElementById('routeActivationModal'),
					title: document.getElementById('routeActivationTitle'),
					message: document.getElementById('routeActivationMessage'),
					cancelButton: document.getElementById('routeActivationCancel'),
					confirmButton: document.getElementById('routeActivationConfirm')
				};
			}

			function resolveRouteActivation(confirmed) {
				const modalElements = getRouteActivationModalElements();

				if (modalElements.modal) {
					modalElements.modal.classList.add('hidden');
					modalElements.modal.classList.remove('flex');
				}

				document.body.classList.remove('overflow-hidden');

				if (typeof routeActivationResolver === 'function') {
					routeActivationResolver(Boolean(confirmed));
				}

				routeActivationResolver = null;
			}

			function requestRouteActivationConfirmation(action = 'on') {
				const modalElements = getRouteActivationModalElements();

				if (!modalElements.modal) {
					return Promise.resolve(false);
				}

				if (routeActivationResolver || logoutConfirmationResolver) {
					return Promise.resolve(false);
				}

				routeActivationAction = action === 'off' ? 'off' : 'on';

				if (modalElements.title) {
					modalElements.title.textContent = routeActivationAction === 'off'
						? `Turn ${routeMeta.id} ${activeMapPeriod} Off-Route?`
						: `Turn ${routeMeta.id} ${activeMapPeriod} On-Route?`;
				}

				if (modalElements.message) {
					modalElements.message.textContent = routeActivationAction === 'off'
						? `Passengers will see this bus as inactive for ${activeMapPeriod} until you turn it on again.`
						: `This bus will be shown as active for ${activeMapPeriod} in passenger view.`;
				}

				if (modalElements.confirmButton) {
					modalElements.confirmButton.textContent = routeActivationAction === 'off'
						? 'Confirm Turn Off'
						: 'Confirm Turn On';
					modalElements.confirmButton.style.background = routeActivationAction === 'off' ? '#dc2626' : '#22c55e';
				}

				modalElements.modal.classList.remove('hidden');
				modalElements.modal.classList.add('flex');
				document.body.classList.add('overflow-hidden');

				return new Promise((resolve) => {
					routeActivationResolver = resolve;
				});
			}

			function setAlert(message, tone) {
				const dashboardAlert = getDashboardAlert();
				if (!dashboardAlert) {
					return;
				}

				if (!message) {
					dashboardAlert.textContent = '';
					dashboardAlert.className = 'mt-4 hidden rounded-2xl border px-4 py-3 text-sm font-semibold';
					return;
				}

				const toneClasses = {
					success: 'border-emerald-200 bg-emerald-50 text-emerald-700',
					error: 'border-rose-200 bg-rose-50 text-rose-700',
					info: 'border-cyan-200 bg-cyan-50 text-cyan-700'
				};

				dashboardAlert.textContent = message;
				dashboardAlert.className = `mt-4 rounded-2xl border px-4 py-3 text-sm font-semibold ${toneClasses[tone] || toneClasses.info}`;
			}

			function getMapPeriodButtons() {
				return {
					am: document.getElementById('mapAmToggle'),
					pm: document.getElementById('mapPmToggle')
				};
			}

			function normalizePassengerLoadValue(loadValue) {
				const supportedLoads = ['Available', 'Standing', 'Full'];
				if (supportedLoads.includes(loadValue)) {
					return loadValue;
				}

				return 'Available';
			}

			function getDashboardPassengerLoadButtons() {
				return Array.from(document.querySelectorAll('[data-dashboard-load]'));
			}

			function isRouteActiveForPeriod(runtime, period = activeMapPeriod) {
				if (!runtime || !runtime.onRoute) {
					return false;
				}

				return runtime.activePeriod === period;
			}

			function isOtherPeriodCurrentlyActive(runtime, period = activeMapPeriod) {
				if (!runtime || !runtime.onRoute) {
					return false;
				}

				return runtime.activePeriod !== period;
			}

			function getSimulateRouteButton() {
				return document.getElementById('simulateRouteButton');
			}

			function setReachedStopIndex(period, value) {
				const normalizedPeriod = period === 'PM' ? 'PM' : 'AM';
				const numericValue = Number.isFinite(value) ? Math.floor(value) : -1;
				reachedStopIndexByPeriod[normalizedPeriod] = Math.max(-1, numericValue);
			}

			function getReachedStopIndex(period) {
				const normalizedPeriod = period === 'PM' ? 'PM' : 'AM';
				const storedValue = reachedStopIndexByPeriod[normalizedPeriod];
				return Number.isFinite(storedValue) ? Math.max(-1, Math.floor(storedValue)) : -1;
			}

			function resetReachedStopIndexes() {
				reachedStopIndexByPeriod.AM = -1;
				reachedStopIndexByPeriod.PM = -1;
			}

			function getRoutePeriodData(period = activeMapPeriod) {
				if (!routeMeta) {
					return null;
				}

				const routePeriods = routeMapData.detailedRoutes[routeMeta.id];
				if (!routePeriods) {
					return null;
				}

				const selectedPeriod = period === 'PM' ? 'PM' : 'AM';
				const periodData = routePeriods[selectedPeriod] || routePeriods.AM || routePeriods.PM;

				if (!periodData || !Array.isArray(periodData.stops)) {
					return null;
				}

				return {
					selectedPeriod,
					periodData
				};
			}

			function getSimulationStopPoints(period = activeMapPeriod) {
				const periodDetails = getRoutePeriodData(period);
				if (!periodDetails || !routeMeta) {
					return {
						selectedPeriod: period === 'PM' ? 'PM' : 'AM',
						periodData: null,
						points: []
					};
				}

				const coordinateTable = routeMapData.stopCoordinates[routeMeta.id] || {};
				const points = [];

				periodDetails.periodData.stops.forEach((stopName, stopIndex) => {
					const coords = coordinateTable[stopName];
					if (!Array.isArray(coords) || coords.length !== 2) {
						return;
					}

					if (!Number.isFinite(coords[0]) || !Number.isFinite(coords[1])) {
						return;
					}

					points.push({
						stopName,
						stopIndex,
						coords
					});
				});

				return {
					selectedPeriod: periodDetails.selectedPeriod,
					periodData: periodDetails.periodData,
					points
				};
			}

			function getRouteStopListItemClass(isPassed) {
				if (isPassed) {
					return 'rounded-xl border border-emerald-300 bg-emerald-100 px-3 py-2 text-emerald-900';
				}

				return 'rounded-xl border border-slate-200 bg-white px-3 py-2 text-slate-700';
			}

			function updateSimulationButtonState(isSelectedPeriodActive) {
				const simulateButton = getSimulateRouteButton();
				if (!simulateButton) {
					return;
				}

				const isCurrentPeriodSimulating = simulationTimerId !== null && simulationPeriod === activeMapPeriod;
				const canSimulate = isSelectedPeriodActive || isCurrentPeriodSimulating;

				simulateButton.textContent = isCurrentPeriodSimulating ? 'Stop Simulate' : 'Simulate';
				simulateButton.disabled = !canSimulate;

				if (!canSimulate) {
					simulateButton.className = 'rounded-xl border border-slate-300 bg-slate-200 px-3 py-1.5 text-xs font-extrabold uppercase tracking-[0.12em] text-slate-500 opacity-70 cursor-not-allowed';
					return;
				}

				simulateButton.className = isCurrentPeriodSimulating
					? 'rounded-xl border border-rose-700 bg-rose-600 px-3 py-1.5 text-xs font-extrabold uppercase tracking-[0.12em] text-white transition hover:bg-rose-700'
					: 'rounded-xl border border-cyan-600 bg-cyan-600 px-3 py-1.5 text-xs font-extrabold uppercase tracking-[0.12em] text-white transition hover:bg-cyan-700';
			}

			function stopRouteSimulation(options = {}) {
				const wasRunning = simulationTimerId !== null;

				if (simulationTimerId !== null) {
					window.clearInterval(simulationTimerId);
					simulationTimerId = null;
				}

				if (options.resetProgress) {
					resetReachedStopIndexes();
				}

				simulationPeriod = null;
				simulationSegmentIndex = 0;
				simulationSegmentStep = 0;
				simulationStopPoints = [];

				if (wasRunning || options.forceRefresh) {
					updateDashboardUI();
				}

				if (options.message) {
					setAlert(options.message, options.tone || 'info');
				}
			}

			function runRouteSimulationTick() {
				if (!routeMeta || !simulationPeriod || simulationStopPoints.length < 2) {
					stopRouteSimulation({ forceRefresh: true });
					return;
				}

				const runtime = routeStore.getDisplayState(routeMeta.id);
				if (!isRouteActiveForPeriod(runtime, simulationPeriod)) {
					stopRouteSimulation({
						message: `Simulation stopped because ${routeMeta.id} ${simulationPeriod} is Off-Route.`,
						tone: 'info'
					});
					return;
				}

				if (simulationSegmentIndex >= simulationStopPoints.length - 1) {
					stopRouteSimulation({
						message: `${routeMeta.id} ${simulationPeriod} simulation completed.`,
						tone: 'success'
					});
					return;
				}

				const fromPoint = simulationStopPoints[simulationSegmentIndex];
				const toPoint = simulationStopPoints[simulationSegmentIndex + 1];

				simulationSegmentStep += 1;
				const progress = Math.min(simulationSegmentStep / SIMULATION_STEPS_PER_SEGMENT, 1);
				const lat = fromPoint.coords[0] + ((toPoint.coords[0] - fromPoint.coords[0]) * progress);
				const lng = fromPoint.coords[1] + ((toPoint.coords[1] - fromPoint.coords[1]) * progress);

				routeStore.setRouteOnRoute(routeMeta.id, true, {
					coords: { lat, lng },
					period: simulationPeriod
				});

				if (progress >= 1) {
					simulationSegmentIndex += 1;
					simulationSegmentStep = 0;
					setReachedStopIndex(simulationPeriod, simulationStopPoints[simulationSegmentIndex].stopIndex);

					if (simulationSegmentIndex >= simulationStopPoints.length - 1) {
						stopRouteSimulation({
							message: `${routeMeta.id} ${simulationPeriod} simulation completed.`,
							tone: 'success',
							forceRefresh: true
						});
						return;
					}
				}

				updateDashboardUI();
			}

			function startRouteSimulation() {
				if (!routeMeta || !routeStore) {
					return;
				}

				const runtime = routeStore.getDisplayState(routeMeta.id);
				if (!isRouteActiveForPeriod(runtime, activeMapPeriod)) {
					setAlert(`Turn ${routeMeta.id} ${activeMapPeriod} On-Route first before simulating.`, 'info');
					updateDashboardUI();
					return;
				}

				const simulationData = getSimulationStopPoints(activeMapPeriod);
				if (!simulationData.periodData || simulationData.points.length < 2) {
					setAlert('Not enough mapped stops to run simulation for this period.', 'error');
					updateDashboardUI();
					return;
				}

				stopRouteSimulation();

				simulationPeriod = simulationData.selectedPeriod;
				simulationStopPoints = simulationData.points;
				simulationSegmentIndex = 0;
				simulationSegmentStep = 0;
				setReachedStopIndex(simulationPeriod, simulationStopPoints[0].stopIndex);

				const firstPoint = simulationStopPoints[0].coords;
				routeStore.setRouteOnRoute(routeMeta.id, true, {
					coords: {
						lat: firstPoint[0],
						lng: firstPoint[1]
					},
					period: simulationPeriod
				});

				updateDashboardUI();
				simulationTimerId = window.setInterval(runRouteSimulationTick, SIMULATION_TICK_MS);
				setAlert(`Simulation started for ${routeMeta.id} ${simulationPeriod}.`, 'info');
			}

			function toggleRouteSimulation() {
				const isCurrentPeriodSimulating = simulationTimerId !== null && simulationPeriod === activeMapPeriod;
				if (isCurrentPeriodSimulating) {
					stopRouteSimulation({
						message: `Simulation stopped for ${routeMeta.id} ${activeMapPeriod}.`,
						tone: 'info'
					});
					return;
				}

				startRouteSimulation();
			}

			function setActiveMapPeriod(nextPeriod) {
				const normalizedPeriod = nextPeriod === 'PM' ? 'PM' : 'AM';

				if (activeMapPeriod === normalizedPeriod) {
					return;
				}

				if (simulationTimerId !== null && simulationPeriod && simulationPeriod !== normalizedPeriod) {
					stopRouteSimulation({
						message: `Simulation for ${routeMeta.id} ${simulationPeriod} stopped after switching to ${normalizedPeriod}.`,
						tone: 'info'
					});
				}

				activeMapPeriod = normalizedPeriod;
				updateDashboardUI();
			}

			function getGeolocationErrorCode(error) {
				if (!error || typeof error.code !== 'number') {
					return 0;
				}

				return error.code;
			}

			function handleLocationWatchError(error) {
				const errorCode = getGeolocationErrorCode(error);

				if (errorCode === GEO_PERMISSION_DENIED) {
					stopRouteSimulation({ resetProgress: true });
					routeStore.setRouteOnRoute(routeMeta.id, false);
					latestCoords = null;
					locationPermissionState = 'denied';
					stopLocationWatch();
					updateDashboardUI();
					setAlert('Location permission was denied. This bus is now Off-Route.', 'error');
					return;
				}

				if (errorCode === GEO_TIMEOUT) {
					setAlert('GPS is taking too long to respond. Bus remains On-Route and will keep trying.', 'info');
					return;
				}

				if (errorCode === GEO_POSITION_UNAVAILABLE) {
					setAlert('GPS position is temporarily unavailable. Bus remains On-Route and will retry.', 'info');
					return;
				}

				setAlert('Temporary location issue detected. Bus remains On-Route.', 'info');
			}

			function getDashboardPassengerLoadButtonClass(loadValue, isActive) {

					Full: 'rounded-lg bg-rose-600 px-3 py-1.5 text-xs font-bold text-white shadow-sm'

					Standing: 'rounded-lg border border-amber-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-600',
					Full: 'rounded-lg border border-rose-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-600'
				};

			function setDashboardPassengerLoad(nextLoadValue) {
				if (!routeMeta || !routeStore || typeof routeStore.setRoutePassengerLoad !== 'function') {
					return;
				}

				const runtime = routeStore.getDisplayState(routeMeta.id);
				const isPeriodActive = isRouteActiveForPeriod(runtime, activeMapPeriod);
				if (!isPeriodActive) {
					setAlert(`Turn this bus On-Route for ${activeMapPeriod} before changing passenger load.`, 'info');
					updateDashboardUI();
					return;
				}

				routeStore.setRoutePassengerLoad(routeMeta.id, normalizePassengerLoadValue(nextLoadValue));
				updateDashboardUI();
			}

			function setMapPeriodToggleState(period) {
				const mapButtons = getMapPeriodButtons();
				if (!mapButtons.am || !mapButtons.pm || !routeMeta) {
					return;
				}

				const isAmActive = period === 'AM';
				mapButtons.am.className = isAmActive
					? 'rounded-lg px-3 py-1.5 text-xs font-bold uppercase tracking-[0.12em] text-white'
					: 'rounded-lg px-3 py-1.5 text-xs font-bold uppercase tracking-[0.12em] text-slate-600 hover:bg-slate-100';
				mapButtons.pm.className = !isAmActive
					? 'rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-bold uppercase tracking-[0.12em] text-white'
					: 'rounded-lg px-3 py-1.5 text-xs font-bold uppercase tracking-[0.12em] text-slate-600 hover:bg-slate-100';
				mapButtons.am.style.background = isAmActive ? routeMeta.color : '';
			}

			function ensureDashboardMap() {
				if (dashboardMap || !window.L) {
					return dashboardMap;
				}

				const mapContainer = document.getElementById('dashboardRouteMap');
				if (!mapContainer) {
					return null;
				}

				dashboardMap = L.map('dashboardRouteMap', {
					zoomControl: true,
					scrollWheelZoom: false
				}).setView(routeMapData.defaultCenter, 12);

				L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
					attribution: '&copy; OpenStreetMap contributors',
					maxZoom: 19
				}).addTo(dashboardMap);

				return dashboardMap;
			}

			function clearDashboardMapLayers() {
				if (!dashboardMap) {
					return;
				}

				if (dashboardPolylineLayer) {
					dashboardMap.removeLayer(dashboardPolylineLayer);
					dashboardPolylineLayer = null;
				}

				if (dashboardMarkerLayer) {
					dashboardMap.removeLayer(dashboardMarkerLayer);

				}
			}

			function buildWaypointIcon(index) {
				if (!routeMeta) {
					return null;
				}

				return L.divIcon({
					className: '',
					html: `<div class="dashboard-waypoint-pin" style="background:${routeMeta.color};">${index + 1}</div>`,
					iconSize: [22, 22],
					iconAnchor: [11, 11]
				});
			}

			function buildBusIcon() {
				return L.divIcon({
					className: '',
					html: '<div class="r102-bus-start-icon" aria-hidden="true">🚌</div>',
					iconSize: [28, 28],
					iconAnchor: [14, 34]
				});
			}

			function projectPointToSegment(point, segmentStart, segmentEnd) {
				const startLat = segmentStart[0];
				const startLng = segmentStart[1];
				const endLat = segmentEnd[0];
				const endLng = segmentEnd[1];
				const deltaLat = endLat - startLat;
				const deltaLng = endLng - startLng;
				const segmentLengthSquared = (deltaLat * deltaLat) + (deltaLng * deltaLng);

				if (segmentLengthSquared <= 0) {
					return {
						t: 0,
						point: [startLat, startLng]
					};
				}

				const projectionNumerator = ((point[0] - startLat) * deltaLat) + ((point[1] - startLng) * deltaLng);
				const unclampedT = projectionNumerator / segmentLengthSquared;
				const t = Math.max(0, Math.min(1, unclampedT));

				return {
					t,
					point: [
						startLat + (deltaLat * t),
						startLng + (deltaLng * t)
					]
				};
			}

			function getSquaredDistance(pointA, pointB) {
				const latDiff = pointA[0] - pointB[0];
				const lngDiff = pointA[1] - pointB[1];
				return (latDiff * latDiff) + (lngDiff * lngDiff);
			}

			function snapPointToRoutePath(point, pathPoints) {
				if (!Array.isArray(point) || point.length !== 2 || !Array.isArray(pathPoints) || pathPoints.length < 2) {
					return point;
				}

				let bestPoint = point;
				let bestDistanceSquared = Number.POSITIVE_INFINITY;

				for (let segmentIndex = 0; segmentIndex < pathPoints.length - 1; segmentIndex += 1) {
					const segmentStart = pathPoints[segmentIndex];
					const segmentEnd = pathPoints[segmentIndex + 1];

					if (!Array.isArray(segmentStart) || !Array.isArray(segmentEnd)) {
						continue;
					}

					const projection = projectPointToSegment(point, segmentStart, segmentEnd);
					const distanceSquared = getSquaredDistance(point, projection.point);

					if (distanceSquared < bestDistanceSquared) {
						bestDistanceSquared = distanceSquared;
						bestPoint = projection.point;
					}
				}

				return bestPoint;
			}

			async function renderSelectedRouteMap(period = activeMapPeriod) {
				if (!routeMeta) {
					return;
				}

				const renderToken = ++dashboardRenderToken;

				const routePeriods = routeMapData.detailedRoutes[routeMeta.id];
				if (!routePeriods) {
					return;
				}

				const selectedPeriod = routePeriods[period] ? period : 'AM';
				activeMapPeriod = selectedPeriod;
				const mapViewKey = `${routeMeta.id}-${selectedPeriod}`;

				const periodData = routePeriods[selectedPeriod];
				const routeTitle = document.getElementById('dashboardRouteTitle');
				const routeStops = document.getElementById('dashboardRouteStops');
				const runtimeState = routeStore.getDisplayState(routeMeta.id);
				const isSelectedPeriodActive = isRouteActiveForPeriod(runtimeState, selectedPeriod);
				const reachedStopIndex = isSelectedPeriodActive ? getReachedStopIndex(selectedPeriod) : -1;

				if (routeTitle) {
					routeTitle.textContent = periodData.title;
				}

				if (routeStops) {
					routeStops.innerHTML = periodData.stops
						.map((stopName, index) => {
							const isPassed = index <= reachedStopIndex;
							const stopNumberClass = isPassed ? 'font-bold text-emerald-800' : 'font-bold text-slate-900';

							return `<li class="${getRouteStopListItemClass(isPassed)}"><span class="${stopNumberClass}">${index + 1}.</span> ${stopName}</li>`;
						})
						.join('');
				}

				setMapPeriodToggleState(selectedPeriod);

				const map = ensureDashboardMap();
				if (!map) {
					return;
				}

				const coordinateTable = routeMapData.stopCoordinates[routeMeta.id] || {};
				const polylinePoints = periodData.stops
					.map((stopName) => coordinateTable[stopName])
					.filter((coords) => Array.isArray(coords) && coords.length === 2);
				const routedPath = roadRouting && polylinePoints.length >= 2
					? await roadRouting.getRoadPath(polylinePoints)
					: polylinePoints;
				const snappedWaypointPoints = routedPath.length >= 2
					? polylinePoints.map((coords) => snapPointToRoutePath(coords, routedPath))
					: polylinePoints;

				if (renderToken !== dashboardRenderToken) {
					return;
				}

				clearDashboardMapLayers();

				if (routedPath.length >= 2) {
					dashboardPolylineLayer = L.polyline(routedPath, {
						color: routeMeta.color,
						weight: 6,
						opacity: 0.82,
						smoothFactor: 1
					}).addTo(map);
				}

				const markerLayer = L.layerGroup();
				snappedWaypointPoints.forEach((coords, index) => {
					L.marker(coords, { icon: buildWaypointIcon(index) })
						.bindTooltip(periodData.stops[index], {
							direction: 'top',
							offset: [0, -10]
						})
						.addTo(markerLayer);
				});

				const hasRuntimeCoords = Boolean(
					runtimeState.coords
					&& Number.isFinite(runtimeState.coords.lat)
					&& Number.isFinite(runtimeState.coords.lng)
				);
				const runtimeBusPoint = hasRuntimeCoords
					? [runtimeState.coords.lat, runtimeState.coords.lng]
					: null;
				const snappedRuntimeBusPoint = runtimeBusPoint && routedPath.length >= 2
					? snapPointToRoutePath(runtimeBusPoint, routedPath)
					: runtimeBusPoint;
				const busPoint = snappedRuntimeBusPoint || snappedWaypointPoints[0] || polylinePoints[0];
				const busTooltip = hasRuntimeCoords
					? `Live ${routeMeta.id} (${selectedPeriod})`
					: `Bus Start: ${periodData.stops[0]}`;

				if (isSelectedPeriodActive && Array.isArray(busPoint)) {
					L.marker(busPoint, { icon: buildBusIcon() })
						.bindTooltip(busTooltip, {
							direction: 'top',
							offset: [0, -20],
							opacity: 0.95
						})
						.addTo(markerLayer);
				}

				dashboardMarkerLayer = markerLayer.addTo(map);

				const boundsPath = routedPath.length >= 2 ? routedPath : polylinePoints;
				const shouldAutoFitView = dashboardMapViewKey !== mapViewKey;

				if (shouldAutoFitView) {
					if (boundsPath.length >= 2) {
						map.fitBounds(boundsPath, {
							padding: [26, 26],
							maxZoom: 14
						});
					} else if (polylinePoints.length === 1) {
						map.setView(polylinePoints[0], 14);
					} else {
						map.setView(routeMapData.defaultCenter, 12);
					}

					dashboardMapViewKey = mapViewKey;
				}

				setTimeout(() => {
					map.invalidateSize();
				}, 0);
			}

			function updateDashboardUI() {
				if (!routeMeta) {
					return;
				}

				const runtime = routeStore.getDisplayState(routeMeta.id);
				const isOnRoute = runtime.onRoute;
				const isSelectedPeriodActive = isRouteActiveForPeriod(runtime, activeMapPeriod);
				const isOtherPeriodActive = isOtherPeriodCurrentlyActive(runtime, activeMapPeriod);
				const dashboardStatusBadge = document.getElementById('dashboardStatusBadge');
				const dashboardBusId = document.getElementById('dashboardBusId');
				const dashboardLocationState = document.getElementById('dashboardLocationState');
				const dashboardLocationHint = document.getElementById('dashboardLocationHint');
				const dashboardLastSync = document.getElementById('dashboardLastSync');
				const dashboardActionButton = document.getElementById('dashboardActionButton');

				dashboardBusId.textContent = operatorSession.busId;
				dashboardLastSync.textContent = formatTimestamp(runtime.lastUpdated);
				dashboardStatusBadge.textContent = isSelectedPeriodActive
					? `On-Route (${activeMapPeriod})`
					: `Off-Route (${activeMapPeriod})`;
				dashboardStatusBadge.className = isSelectedPeriodActive
					? 'rounded-full bg-green-500 px-4 py-1.5 text-xs font-bold text-white'
					: 'rounded-full bg-rose-600 px-4 py-1.5 text-xs font-bold text-white';
				updateDashboardPassengerLoadUI(runtime.passengerLoad, isSelectedPeriodActive);

				if (locationPermissionState === 'granted') {
					dashboardLocationState.textContent = isOnRoute ? 'Location Active' : 'Location Ready';
					dashboardLocationState.className = `mt-2 text-lg font-extrabold ${isOnRoute ? 'text-emerald-700' : 'text-slate-900'}`;
					dashboardLocationHint.textContent = `GPS: ${formatCoords(runtime.coords || latestCoords)}`;
				} else if (locationPermissionState === 'denied') {
					dashboardLocationState.textContent = 'Location Blocked';
					dashboardLocationState.className = 'mt-2 text-lg font-extrabold text-rose-700';
					dashboardLocationHint.textContent = 'Enable location access before turning this bus On-Route.';
				} else if (locationPermissionState === 'prompt') {
					dashboardLocationState.textContent = 'Permission Needed';
					dashboardLocationState.className = 'mt-2 text-lg font-extrabold text-amber-600';
					dashboardLocationHint.textContent = 'The browser will ask for location access when you turn this bus on.';
				} else if (locationPermissionState === 'unsupported') {
					dashboardLocationState.textContent = 'Location Unsupported';
					dashboardLocationState.className = 'mt-2 text-lg font-extrabold text-slate-700';
					dashboardLocationHint.textContent = 'This browser cannot provide location access.';
				} else {
					dashboardLocationState.textContent = 'Checking...';
					dashboardLocationState.className = 'mt-2 text-lg font-extrabold text-slate-900';
					dashboardLocationHint.textContent = 'Checking location permission.';
				}

				dashboardActionButton.textContent = isOtherPeriodActive
					? `Turn Off ${runtime.activePeriod} first`
					: (isTurningOnRoute && !isSelectedPeriodActive
						? 'Turning On...'
						: (isSelectedPeriodActive ? 'Turn Off On-Route' : 'Turn On On-Route'));
				dashboardActionButton.style.background = isOtherPeriodActive
					? '#94a3b8'
					: (isSelectedPeriodActive ? '#dc2626' : '#22c55e');
				dashboardActionButton.style.color = '#ffffff';
				dashboardActionButton.style.borderColor = isOtherPeriodActive
					? '#64748b'
					: (isSelectedPeriodActive ? '#991b1b' : '#16a34a');
				dashboardActionButton.disabled = isTurningOnRoute || isOtherPeriodActive;
				dashboardActionButton.classList.toggle('opacity-70', isTurningOnRoute || isOtherPeriodActive);
				dashboardActionButton.classList.toggle('cursor-wait', isTurningOnRoute);
				dashboardActionButton.classList.toggle('cursor-not-allowed', isOtherPeriodActive);
				updateSimulationButtonState(isSelectedPeriodActive);

				renderSelectedRouteMap(activeMapPeriod);
			}

			function stopLocationWatch() {
				if (locationWatchId === null || !navigator.geolocation) {
					return;
				}

				navigator.geolocation.clearWatch(locationWatchId);
				locationWatchId = null;
			}

			function startLocationWatch() {
				if (locationWatchId !== null || !navigator.geolocation || !routeMeta) {
					return;
				}

				locationWatchId = navigator.geolocation.watchPosition(
					(position) => {
						if (simulationTimerId !== null) {
							return;
						}

						latestCoords = {
							lat: position.coords.latitude,
							lng: position.coords.longitude
						};
						const runtime = routeStore.getDisplayState(routeMeta.id);
						routeStore.setRouteOnRoute(routeMeta.id, true, {
							coords: latestCoords,
							period: runtime.activePeriod || activeMapPeriod
						});
						updateDashboardUI();
					},
					(error) => {
						handleLocationWatchError(error);
					},
					{
						enableHighAccuracy: true,
						maximumAge: 15000,
						timeout: 20000
					}
				);
			}

			function syncLocationWatch() {
				if (!routeMeta) {
					return;
				}

				if (routeStore.getDisplayState(routeMeta.id).onRoute) {
					startLocationWatch();
				} else {
					stopLocationWatch();
				}
			}

			async function watchLocationPermission() {
				if (!navigator.geolocation) {
					locationPermissionState = 'unsupported';
					updateDashboardUI();
					return;
				}

				if (!navigator.permissions || !navigator.permissions.query) {
					locationPermissionState = 'prompt';
					updateDashboardUI();
					return;
				}

				try {
					permissionStatusHandle = await navigator.permissions.query({ name: 'geolocation' });
					locationPermissionState = permissionStatusHandle.state;
					updateDashboardUI();

					permissionStatusHandle.onchange = () => {
						locationPermissionState = permissionStatusHandle.state;

						if (locationPermissionState === 'denied' && routeMeta) {
							stopRouteSimulation({ resetProgress: true });
							routeStore.setRouteOnRoute(routeMeta.id, false);
							latestCoords = null;
							syncLocationWatch();
						}

						updateDashboardUI();
					};
				} catch (error) {
					locationPermissionState = 'prompt';
					updateDashboardUI();
				}
			}

			function enableRoute() {
				if (!navigator.geolocation || !routeMeta) {
					setAlert('Location access is not available on this device.', 'error');
					return;
				}

				if (isTurningOnRoute) {
					return;
				}

				isTurningOnRoute = true;
				updateDashboardUI();

				navigator.geolocation.getCurrentPosition(
					(position) => {
						isTurningOnRoute = false;
						latestCoords = {
							lat: position.coords.latitude,
							lng: position.coords.longitude
						};
						locationPermissionState = 'granted';
						routeStore.setRouteOnRoute(routeMeta.id, true, {
							coords: latestCoords,
							period: activeMapPeriod
						});
						updateDashboardUI();
						syncLocationWatch();
						setAlert(`${routeMeta.id} ${activeMapPeriod} is now On-Route.`, 'success');
					},
					() => {
						isTurningOnRoute = false;
						updateDashboardUI();
						setAlert('Location access is required before turning this bus On-Route.', 'error');
					},
					{
						enableHighAccuracy: true,
						maximumAge: 15000,
						timeout: 20000
					}
				);
			}

			function disableRoute() {
				if (!routeMeta) {
					return;
				}

				isTurningOnRoute = false;

				stopRouteSimulation({ resetProgress: true });
				routeStore.setRouteOnRoute(routeMeta.id, false);
				updateDashboardUI();
				syncLocationWatch();
				setAlert(`${routeMeta.id} ${activeMapPeriod} is now Off-Route.`, 'info');
			}

			function toggleRoute() {
				if (!routeMeta) {
					return;
				}

				if (isTurningOnRoute) {
					return;
				}

				const runtime = routeStore.getDisplayState(routeMeta.id);
				const isSelectedPeriodActive = isRouteActiveForPeriod(runtime, activeMapPeriod);
				const isOtherPeriodActive = isOtherPeriodCurrentlyActive(runtime, activeMapPeriod);
				if (isOtherPeriodActive) {
					setAlert(`Cannot turn ${activeMapPeriod} On-Route while ${runtime.activePeriod} is active. Turn ${runtime.activePeriod} Off-Route first.`, 'info');
					updateDashboardUI();
					return;
				}

				if (isSelectedPeriodActive) {
					requestRouteActivationConfirmation('off').then((confirmed) => {
						if (!confirmed) {
							return;
						}

						disableRoute();
					});
					return;
				}

				requestRouteActivationConfirmation('on').then((confirmed) => {
					if (!confirmed) {
						return;
					}

					enableRoute();
				});
			}

			initializeTopLogoButton();

			if (!routeStore || !routeMeta || !operatorSession || !operatorSession.busId || !operatorSession.busCode) {
				setTopLogoutButtonVisibility(false);
				renderMissingSession();
			} else {
				setTopLogoutButtonVisibility(true);
				renderDashboardShell();
				updateDashboardUI();
				watchLocationPermission();
				syncLocationWatch();

				const topLogoutButton = getTopLogoutButton();
				if (topLogoutButton) {
					topLogoutButton.addEventListener('click', () => {
						requestLogoutConfirmation().then((confirmed) => {
							if (!confirmed) {
								return;
							}

							logoutOperatorSession();
						});
					});
				}

				document.getElementById('dashboardActionButton').addEventListener('click', toggleRoute);

				getDashboardPassengerLoadButtons().forEach((button) => {
					button.addEventListener('click', () => {
						setDashboardPassengerLoad(button.dataset.dashboardLoad);
					});
				});

				const routeActivationModalElements = getRouteActivationModalElements();
				routeActivationModalElements.cancelButton.addEventListener('click', () => {
					resolveRouteActivation(false);
				});
				routeActivationModalElements.confirmButton.addEventListener('click', () => {
					resolveRouteActivation(true);
				});
				routeActivationModalElements.modal.addEventListener('click', (event) => {
					if (event.target === routeActivationModalElements.modal) {
						resolveRouteActivation(false);
					}
				});

				const logoutModalElements = getLogoutConfirmModalElements();
				logoutModalElements.cancelButton.addEventListener('click', () => {
					resolveLogoutConfirmation(false);
				});
				logoutModalElements.confirmButton.addEventListener('click', () => {
					resolveLogoutConfirmation(true);
				});
				logoutModalElements.modal.addEventListener('click', (event) => {
					if (event.target === logoutModalElements.modal) {
						resolveLogoutConfirmation(false);
					}
				});

				document.getElementById('mapAmToggle').addEventListener('click', () => {
					setActiveMapPeriod('AM');
				});

				document.getElementById('mapPmToggle').addEventListener('click', () => {
					setActiveMapPeriod('PM');
				});

				document.getElementById('simulateRouteButton').addEventListener('click', toggleRouteSimulation);

				routeStore.subscribe(() => {
					updateDashboardUI();
				});

				window.addEventListener('focus', () => {
					updateDashboardUI();
				});

				window.addEventListener('keydown', (event) => {
					if (event.key === 'Escape' && routeActivationResolver) {
						resolveRouteActivation(false);
					}

					if (event.key === 'Escape' && logoutConfirmationResolver) {
						resolveLogoutConfirmation(false);
					}
				});

				window.addEventListener('beforeunload', () => {
					resolveRouteActivation(false);
					resolveLogoutConfirmation(false);
					stopRouteSimulation();
					stopLocationWatch();
				});
			}
		</script>
	</body>
</html>
