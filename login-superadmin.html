<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin Login - DC Bus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(6, 182, 212, 0.12), transparent 32%),
          radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.08), transparent 28%),
          #f8fafc;
      }

      .panel-shadow {
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      .input-field {
        transition: all 0.2s ease;
      }

      .input-field:focus {
        outline: none;
        border-color: #06b6d4;
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
      }

      .btn-primary {
        background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        transition: all 0.2s ease;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
        box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
      }

      .btn-primary:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8">
        <img src="assets/dcbuslogo.png" alt="DC Bus Logo" class="h-20 w-auto mx-auto mb-4" />
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Super Admin Portal</h1>
        <p class="text-sm text-slate-600">Sign in to access administrative controls</p>
      </div>

      <!-- Login Card -->
      <div class="bg-white rounded-3xl border border-slate-200 p-8 panel-shadow">
        <form id="loginForm" onsubmit="handleLogin(event)">
          <!-- Alert Message -->
          <div id="alertMessage" class="hidden mb-6 rounded-xl border px-4 py-3 text-sm font-semibold"></div>

          <!-- Username Field -->
          <div class="mb-5">
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">
              Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="input-field w-full px-4 py-3 rounded-xl border border-slate-300 text-slate-900 placeholder-slate-400"
              placeholder="Enter your username"
              autocomplete="username"
            />
          </div>

          <!-- Password Field -->
          <div class="mb-6">
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="input-field w-full px-4 py-3 rounded-xl border border-slate-300 text-slate-900 placeholder-slate-400"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="btn-primary w-full py-3.5 rounded-xl text-white font-bold text-base"
          >
            Sign In
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="text-center mt-6">
        <p class="text-xs text-slate-500">
          © 2026 Davao City Bus System. All rights reserved.
        </p>
      </div>
    </div>

    <script>
      function showAlert(message, type) {
        const alertEl = document.getElementById('alertMessage');
        alertEl.textContent = message;
        alertEl.className = 'mb-6 rounded-xl border px-4 py-3 text-sm font-semibold';
        
        if (type === 'error') {
          alertEl.classList.add('border-red-200', 'bg-red-50', 'text-red-700');
        } else if (type === 'success') {
          alertEl.classList.add('border-emerald-200', 'bg-emerald-50', 'text-emerald-700');
        }
        
        alertEl.classList.remove('hidden');
      }

      function handleLogin(event) {
        event.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        // Simple validation (you can enhance this with actual authentication)
        if (username === 'superadmin' && password === 'dcbus2026') {
          // Store session
          sessionStorage.setItem('dc-bus-superadmin-session', JSON.stringify({
            username: username,
            loginTime: new Date().toISOString()
          }));
          
          showAlert('Login successful! Redirecting...', 'success');
          
          // Redirect to super admin dashboard
          setTimeout(() => {
            window.location.href = 'frontend/superadmin.html';
          }, 1000);
        } else {
          showAlert('Invalid username or password. Please try again.', 'error');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }

      // Check if already logged in
      window.addEventListener('DOMContentLoaded', () => {
        const session = sessionStorage.getItem('dc-bus-superadmin-session');
        if (session) {
          window.location.href = 'frontend/superadmin.html';
        }
      });
    </script>
  </body>
</html>
